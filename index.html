    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const SECURE_ACCESS_KEY = "$Vallemadero6";

        function App() {
            const [isEditing, setIsEditing] = useState(false);
            const [showPinInput, setShowPinInput] = useState(false);
            const [view, setView] = useState('home');
            const [selectedGame, setSelectedGame] = useState(null);
            const [passInput, setPassInput] = useState("");
            const [searchTerm, setSearchTerm] = useState("");
            
            // Estado para la pantalla principal
            const [homeContent, setHomeContent] = useState({
                title: "Bienvenido a Gamepedia",
                description: "Tu enciclopedia personal de videojuegos. Todo en un solo lugar.",
                bgImage: "https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=2070&auto=format&fit=crop"
            });
            
            // Estado para los juegos
            const [games, setGames] = useState([
                { 
                    id: 1, 
                    title: "Super Mario Bros", 
                    developer: "Nintendo", 
                    year: "1985",
                    cover: "https://images.unsplash.com/photo-1605898835518-936630f9257d?q=80&w=800&auto=format&fit=crop",
                    ageRating: "Todo público (E)",
                    systemRequirements: "Procesador: Ricoh 2A03 8-bit. RAM: 2KB. Video: Ricoh PPU.",
                    description: "Super Mario Bros. es un videojuego de plataformas, diseñado por Shigeru Miyamoto, lanzado el 13 de septiembre de 1985 y producido por la compañía japonesa Nintendo, para la consola Nintendo Entertainment System (NES). El juego describe las aventuras de los hermanos Mario y Luigi, quienes deben rescatar a la Princesa Peach del Reino Champiñón que fue secuestrada por el rey de los Koopas, Bowser.",
                    platforms: [
                        { name: "NES", price: "Original" },
                        { name: "Nintendo Switch", price: "Gratis con Suscripción" }
                    ]
                }
            ]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (passInput === SECURE_ACCESS_KEY) {
                    setIsEditing(true);
                    setShowPinInput(false);
                    setPassInput("");
                } else {
                    alert("PIN Incorrecto");
                }
            };

            const addNewGame = () => {
                const newGame = {
                    id: Date.now(),
                    title: "Nuevo Título",
                    developer: "Estudio Desarrollador",
                    year: "2024",
                    cover: "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=800",
                    ageRating: "PEGI 12 / ESRB T",
                    systemRequirements: "Mínimos: CPU i5, 8GB RAM, GTX 1050. Recomendados: CPU i7, 16GB RAM, RTX 3060.",
                    description: "Escribe aquí la historia y detalles del juego...",
                    platforms: [{ name: "PC / Steam", price: "0.00" }]
                };
                setGames([...games, newGame]);
                setSelectedGame(newGame);
            };

            const filteredGames = games.filter(g => 
                g.title.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div className="min-h-screen relative bg-slate-950">
                    {/* Fondo Dinámico */}
                    {view === 'home' && (
                        <div 
                            className="absolute inset-0 bg-cover bg-center bg-no-repeat transition-opacity duration-1000"
                            style={{ backgroundImage: `url('${homeContent.bgImage}')`, opacity: 0.3 }}
                        />
                    )}
                    <div className="absolute inset-0 hero-gradient pointer-events-none" />

                    {/* Navbar */}
                    <nav className="fixed top-0 left-0 right-0 z-40 glass border-b border-white/5 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => {setView('home'); setSelectedGame(null);}}>
                                <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-600/20">
                                    <Icon name="gamepad-2" />
                                </div>
                                <h1 className="text-xl font-black tracking-tighter uppercase italic">GAMEPEDIA</h1>
                            </div>

                            <div className="flex items-center gap-4">
                                <button onClick={() => {setView('home'); setSelectedGame(null);}} className={`p-2 rounded-xl transition ${view === 'home' ? 'text-indigo-400 bg-indigo-500/10' : 'text-slate-400'}`}>
                                    <Icon name="home" />
                                </button>
                                <button onClick={() => {setView('catalog'); setSelectedGame(null);}} className={`p-2 rounded-xl transition ${view === 'catalog' ? 'text-indigo-400 bg-indigo-500/10' : 'text-slate-400'}`}>
                                    <Icon name="layout-grid" />
                                </button>

                                <div className="h-6 w-px bg-slate-800 mx-2" />

                                {!isEditing ? (
                                    <div className="flex items-center gap-2">
                                        {showPinInput ? (
                                            <form onSubmit={handleLogin} className="flex gap-2">
                                                <input 
                                                    autoFocus
                                                    type="password" 
                                                    value={passInput} 
                                                    onChange={e => setPassInput(e.target.value)} 
                                                    className="bg-slate-900 border border-indigo-500 rounded-lg px-3 py-1 text-xs w-24 outline-none text-white" 
                                                    placeholder="PIN" 
                                                />
                                            </form>
                                        ) : (
                                            <button onClick={() => setShowPinInput(true)} className="text-slate-500 hover:text-white transition">
                                                <Icon name="lock" size={18}/>
                                            </button>
                                        )}
                                    </div>
                                ) : (
                                    <button onClick={() => setIsEditing(false)} className="text-red-500 flex items-center gap-2 text-xs font-black tracking-widest">
                                        <Icon name="log-out" size={16} /> SALIR
                                    </button>
                                )}
                            </div>
                        </div>
                    </nav>

                    {/* Contenido Principal */}
                    <main className="pt-32 pb-20 px-6 max-w-7xl mx-auto relative z-10">
                        {view === 'home' ? (
                            <div className="flex flex-col items-center justify-center min-h-[60vh] text-center space-y-12 animate-in fade-in zoom-in duration-700">
                                <div className="space-y-4">
                                    <h2 className="text-6xl md:text-8xl font-black italic uppercase bg-gradient-to-b from-white to-slate-500 bg-clip-text text-transparent leading-tight">
                                        {homeContent.title}
                                    </h2>
                                    <p className="text-xl text-slate-400 font-medium max-w-2xl mx-auto">
                                        {homeContent.description}
                                    </p>
                                </div>

                                <div className="w-full max-w-2xl space-y-8">
                                    <div className="relative group">
                                        <Icon name="search" className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-indigo-400 transition-colors" size={24} />
                                        <input 
                                            type="text" 
                                            placeholder="Busca un videojuego..."
                                            value={searchTerm}
                                            onChange={(e) => {
                                                setSearchTerm(e.target.value);
                                                if (e.target.value.length > 0) setView('catalog');
                                            }}
                                            className="w-full bg-slate-900/60 border border-white/10 rounded-[2rem] py-6 pl-16 pr-8 text-lg outline-none focus:border-indigo-500/50 focus:ring-4 focus:ring-indigo-500/10 transition-all shadow-2xl backdrop-blur-md text-white"
                                        />
                                    </div>

                                    <button 
                                        onClick={() => setView('catalog')}
                                        className="group relative inline-flex items-center gap-4 bg-indigo-600 hover:bg-indigo-500 text-white px-12 py-6 rounded-[2rem] font-black uppercase tracking-[0.2em] transition-all hover:scale-105 active:scale-95 shadow-xl shadow-indigo-600/20"
                                    >
                                        <Icon name="layout-grid" size={22} />
                                        ENTRAR AL CATÁLOGO
                                    </button>

                                    {isEditing && (
                                        <div className="mt-12 p-8 glass border border-indigo-500/30 rounded-[3rem] text-left space-y-6">
                                            <h3 className="text-indigo-400 text-[10px] font-black uppercase tracking-widest border-b border-white/10 pb-2">Ajustes de Inicio (Admin)</h3>
                                            <div className="grid grid-cols-1 gap-4 text-white">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] text-slate-500 font-bold ml-1 uppercase">Título de Bienvenida</label>
                                                    <input className="bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm w-full outline-none focus:border-indigo-500" value={homeContent.title} onChange={e => setHomeContent({...homeContent, title: e.target.value})} />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] text-slate-500 font-bold ml-1 uppercase">Descripción corta</label>
                                                    <textarea className="bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm w-full outline-none focus:border-indigo-500 h-24" value={homeContent.description} onChange={e => setHomeContent({...homeContent, description: e.target.value})} />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] text-slate-500 font-bold ml-1 uppercase">URL Fondo (Wallpaper)</label>
                                                    <input className="bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm w-full outline-none focus:border-indigo-500" value={homeContent.bgImage} onChange={e => setHomeContent({...homeContent, bgImage: e.target.value})} />
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="animate-in fade-in duration-500">
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                    {filteredGames.map(game => (
                                        <div 
                                            key={game.id} 
                                            onClick={() => setSelectedGame(game)}
                                            className="game-card group relative aspect-[3/4] rounded-[2.5rem] overflow-hidden bg-slate-900 border border-white/5 cursor-pointer shadow-2xl transition-all"
                                        >
                                            <img src={game.cover} className="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-all duration-700" alt={game.title} />
                                            <div className="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20 to-transparent" />
                                            <div className="absolute bottom-6 left-6 right-6">
                                                <span className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">{game.year}</span>
                                                <h3 className="text-xl font-bold text-white italic truncate">{game.title}</h3>
                                            </div>
                                        </div>
                                    ))}
                                    
                                    {isEditing && (
                                        <button 
                                            onClick={addNewGame}
                                            className="aspect-[3/4] border-2 border-dashed border-slate-800 rounded-[2.5rem] flex flex-col items-center justify-center gap-3 text-slate-600 hover:border-indigo-500 hover:text-indigo-500 transition-all"
                                        >
                                            <Icon name="plus" size={32} />
                                            <span className="font-bold uppercase text-[10px]">Añadir Registro</span>
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modal de Detalle de Juego */}
                    {selectedGame && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 md:p-8 animate-in fade-in duration-300">
                            <div className="absolute inset-0 bg-slate-950/95 backdrop-blur-md" onClick={() => setSelectedGame(null)} />
                            
                            <div className="relative w-full max-w-6xl max-h-[92vh] glass border border-white/10 rounded-[3rem] overflow-hidden flex flex-col md:flex-row shadow-2xl animate-in zoom-in-95 duration-300">
                                {/* Imagen Lateral y Configuración de Imagen */}
                                <div className="w-full md:w-5/12 h-64 md:h-auto relative bg-slate-900">
                                    <img src={selectedGame.cover} className="w-full h-full object-cover" alt={selectedGame.title} />
                                    <div className="absolute inset-0 bg-gradient-to-t md:bg-gradient-to-r from-slate-950 via-transparent to-transparent" />
                                    
                                    {isEditing && (
                                        <div className="absolute top-8 left-8 right-8 space-y-2 glass p-4 rounded-2xl border border-white/10">
                                            <label className="text-[10px] font-black uppercase text-white/70">Editar Portada (URL)</label>
                                            <input 
                                                className="w-full bg-slate-950/80 border border-white/10 rounded-xl px-3 py-2 text-[10px] text-white outline-none"
                                                value={selectedGame.cover}
                                                onChange={e => {
                                                    const newGames = [...games];
                                                    newGames.find(g => g.id === selectedGame.id).cover = e.target.value;
                                                    setGames(newGames);
                                                }}
                                            />
                                        </div>
                                    )}
                                </div>

                                {/* Información Detallada con Scroll */}
                                <div className="flex-1 p-8 md:p-12 overflow-y-auto custom-scrollbar space-y-10 text-white">
                                    <div className="flex justify-between items-start">
                                        <div className="space-y-3 flex-1">
                                            {isEditing ? (
                                                <div className="space-y-4">
                                                    <div className="flex gap-4">
                                                        <input 
                                                            className="bg-transparent text-4xl md:text-5xl font-black italic uppercase text-white w-full outline-none border-b border-white/10"
                                                            value={selectedGame.title}
                                                            placeholder="Título del Juego"
                                                            onChange={e => {
                                                                const newGames = [...games];
                                                                newGames.find(g => g.id === selectedGame.id).title = e.target.value;
                                                                setGames(newGames);
                                                            }}
                                                        />
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div>
                                                            <label className="text-[9px] text-slate-500 font-bold uppercase ml-1">Estudio</label>
                                                            <input className="bg-slate-900/50 w-full p-2 rounded-lg text-xs" value={selectedGame.developer} onChange={e => {
                                                                const newGames = [...games];
                                                                newGames.find(g => g.id === selectedGame.id).developer = e.target.value;
                                                                setGames(newGames);
                                                            }} />
                                                        </div>
                                                        <div>
                                                            <label className="text-[9px] text-slate-500 font-bold uppercase ml-1">Año Lanzamiento</label>
                                                            <input className="bg-slate-900/50 w-full p-2 rounded-lg text-xs" value={selectedGame.year} onChange={e => {
                                                                const newGames = [...games];
                                                                newGames.find(g => g.id === selectedGame.id).year = e.target.value;
                                                                setGames(newGames);
                                                            }} />
                                                        </div>
                                                    </div>
                                                </div>
                                            ) : (
                                                <>
                                                    <h2 className="text-4xl md:text-5xl font-black italic uppercase text-white leading-tight">{selectedGame.title}</h2>
                                                    <div className="flex flex-wrap gap-4 text-xs font-bold text-slate-500 uppercase tracking-widest pt-2">
                                                        <span className="flex items-center gap-2 bg-white/5 px-3 py-1 rounded-full"><Icon name="calendar" size={14}/> {selectedGame.year}</span>
                                                        <span className="flex items-center gap-2 bg-white/5 px-3 py-1 rounded-full"><Icon name="shield" size={14}/> {selectedGame.ageRating}</span>
                                                        <span className="text-indigo-400 italic pt-1">{selectedGame.developer}</span>
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                        <button onClick={() => setSelectedGame(null)} className="p-2 hover:bg-white/5 rounded-full transition text-slate-400"><Icon name="x" size={24}/></button>
                                    </div>

                                    {/* Edad Permitida y Requisitos (Edición) */}
                                    {isEditing && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-white/5 pt-4">
                                            <div>
                                                <label className="text-[9px] text-indigo-400 font-bold uppercase ml-1">Edad Permitida (Clasificación)</label>
                                                <input className="bg-slate-900/50 w-full p-2 rounded-lg text-xs" value={selectedGame.ageRating} onChange={e => {
                                                    const newGames = [...games];
                                                    newGames.find(g => g.id === selectedGame.id).ageRating = e.target.value;
                                                    setGames(newGames);
                                                }} />
                                            </div>
                                            <div>
                                                <label className="text-[9px] text-indigo-400 font-bold uppercase ml-1">Requisitos del Sistema</label>
                                                <textarea className="bg-slate-900/50 w-full p-2 rounded-lg text-xs h-20" value={selectedGame.systemRequirements} onChange={e => {
                                                    const newGames = [...games];
                                                    newGames.find(g => g.id === selectedGame.id).systemRequirements = e.target.value;
                                                    setGames(newGames);
                                                }} placeholder="CPU, RAM, GPU..." />
                                            </div>
                                        </div>
                                    )}

                                    {/* Información técnica visible */}
                                    {!isEditing && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div className="space-y-4">
                                                <h4 className="text-[10px] font-black text-indigo-500 uppercase tracking-[0.3em]">Descripción</h4>
                                                <p className="text-slate-300 leading-relaxed italic font-light text-base">{selectedGame.description}</p>
                                            </div>
                                            <div className="space-y-4">
                                                <h4 className="text-[10px] font-black text-indigo-500 uppercase tracking-[0.3em]">Requisitos Técnicos</h4>
                                                <div className="bg-slate-900/40 p-4 rounded-2xl border border-white/5 text-sm text-slate-400 leading-relaxed">
                                                    {selectedGame.systemRequirements}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Descripción (Edición) */}
                                    {isEditing && (
                                        <div className="space-y-2">
                                            <label className="text-[9px] text-indigo-400 font-bold uppercase ml-1">Descripción del Juego</label>
                                            <textarea 
                                                className="w-full bg-slate-900/50 border border-white/5 rounded-2xl p-4 text-sm leading-relaxed outline-none h-40"
                                                value={selectedGame.description}
                                                onChange={e => {
                                                    const newGames = [...games];
                                                    newGames.find(g => g.id === selectedGame.id).description = e.target.value;
                                                    setGames(newGames);
                                                }}
                                            />
                                        </div>
                                    )}

                                    {/* Plataformas, Dispositivos y Precios */}
                                    <div className="space-y-6 pt-4 border-t border-white/5">
                                        <div className="flex justify-between items-center">
                                            <h4 className="text-[10px] font-black text-indigo-500 uppercase tracking-[0.3em]">Plataformas, Dispositivos y Precios</h4>
                                            {isEditing && (
                                                <button 
                                                    onClick={() => {
                                                        const newGames = [...games];
                                                        newGames.find(g => g.id === selectedGame.id).platforms.push({name: "", price: ""});
                                                        setGames(newGames);
                                                    }}
                                                    className="text-[10px] font-bold bg-indigo-600/20 text-indigo-400 px-3 py-1 rounded-lg"
                                                >+ Añadir Plataforma</button>
                                            )}
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                            {selectedGame.platforms.map((plat, idx) => (
                                                <div key={idx} className="bg-slate-900/50 p-4 rounded-3xl border border-white/5 flex flex-col gap-1 transition-all hover:bg-slate-900/80">
                                                    {isEditing ? (
                                                        <div className="space-y-2">
                                                            <input className="bg-slate-950 w-full p-2 text-[10px] rounded-lg" value={plat.name} onChange={e => {
                                                                const newGames = [...games];
                                                                newGames.find(g => g.id === selectedGame.id).platforms[idx].name = e.target.value;
                                                                setGames(newGames);
                                                            }} placeholder="Dispositivo / Plataforma" />
                                                            <input className="bg-slate-950 w-full p-2 text-[10px] rounded-lg" value={plat.price} onChange={e => {
                                                                const newGames = [...games];
                                                                newGames.find(g => g.id === selectedGame.id).platforms[idx].price = e.target.value;
                                                                setGames(newGames);
                                                            }} placeholder="Precio (ej: $59.99)" />
                                                            <button className="text-[9px] text-red-500 font-bold uppercase tracking-tighter" onClick={() => {
                                                                const newGames = [...games];
                                                                newGames.find(g => g.id === selectedGame.id).platforms.splice(idx, 1);
                                                                setGames(newGames);
                                                            }}>Eliminar</button>
                                                        </div>
                                                    ) : (
                                                        <>
                                                            <div className="flex items-center gap-2 mb-1">
                                                                <Icon name="monitor" size={12} className="text-indigo-400" />
                                                                <span className="text-[10px] font-black text-slate-500 uppercase tracking-wide">{plat.name}</span>
                                                            </div>
                                                            <span className="text-xl font-bold text-white tracking-tight">{plat.price}</span>
                                                        </>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Borrar Juego (Admin) */}
                                    {isEditing && (
                                        <div className="pt-8 flex gap-4">
                                            <button 
                                                onClick={() => {
                                                    if(confirm("¿Estás seguro de que quieres eliminar este videojuego de la base de datos?")) {
                                                        setGames(games.filter(g => g.id !== selectedGame.id));
                                                        setSelectedGame(null);
                                                    }
                                                }}
                                                className="flex-1 py-4 border border-red-500/20 text-red-500 text-[10px] font-black uppercase tracking-widest rounded-2xl hover:bg-red-500/10 transition"
                                            >
                                                Eliminar Registro Permanentemente
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body></html>
